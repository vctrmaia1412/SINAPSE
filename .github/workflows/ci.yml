name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devevents
          POSTGRES_PASSWORD: devevents_secret
          POSTGRES_DB: devevents_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U devevents -d devevents_test"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, pdo, pgsql
          coverage: none
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Run PHPUnit
        run: php artisan test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install npm dependencies
        run: npm ci
      - name: Build
        run: npm run build
