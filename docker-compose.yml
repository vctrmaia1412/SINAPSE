# DevEvents — Laravel + React + PostgreSQL
# Uso: copie .env.example → .env, depois: docker compose up -d --build

name: devevents

services:
  postgres:
    image: postgres:16-alpine
    container_name: devevents-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devevents}
      POSTGRES_USER: ${POSTGRES_USER:-devevents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devevents_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - devevents

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devevents-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-DevEvents}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-devevents}
      DB_USERNAME: ${POSTGRES_USER:-devevents}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-devevents_secret}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:8080,127.0.0.1,127.0.0.1:8080}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - devevents
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/up >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: devevents-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - devevents

volumes:
  postgres_data:
    name: devevents_postgres_data

networks:
  devevents:
    driver: bridge
